{% extends "base.html" %}

{% block content %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center px-6 py-24">
    <div class="max-w-2xl w-full text-center">
        
        <!-- Icon -->
        <div class="mx-auto flex items-center justify-center mb-10 text-8xl">
            {{ icon|safe }}
        </div>

        <h1 class="serif text-6xl md:text-7xl font-light mb-4 text-gray-900">
            {{ error_code }}
        </h1>
        
        <h2 class="text-3xl font-light text-gray-700 mb-6">{{ title }}</h2>
        
        <p class="text-lg text-neutral max-w-md mx-auto mb-12 leading-relaxed">
            {{ message }}
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/" 
               class="btn-primary px-10 py-4 text-lg inline-flex items-center gap-2 justify-center">
                <i class="fa-solid fa-house"></i>
                <span>Back to Home</span>
            </a>
            <a href="/contact" 
               class="btn-outline px-10 py-4 text-lg inline-flex items-center gap-2 justify-center">
                <i class="fa-solid fa-envelope"></i>
                Contact Us
            </a>
        </div>

       
    </div>
</div>
{% endblock %}
